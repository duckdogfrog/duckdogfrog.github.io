<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Page Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background 0.5s ease;
            overflow: hidden;
            position: relative; /* Essential for containing absolute positioned elements */
        }

        .card {
            background: white;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            z-index: 100; /* Keeps the control card above random ads */
        }

        h1 {
            color: #333;
            margin-top: 0;
            font-size: 2rem;
            text-transform: uppercase;
        }

        p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
        }

        button {
            font-family: 'Oswald', sans-serif;
            background-color: #ffc30f;
            color: black;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            background-size: 400% 400%;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: buttonGradient 2.5s ease infinite;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 60, 126, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        @keyframes buttonGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- DYNAMIC AD STYLING --- */
        .dynamic-ad {
            position: absolute;
            width: 180px;
            background: #fff;
            border: 3px dashed #ff1100;
            padding: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            z-index: 50; /* Sits below the main card, but covers layout spaces */
            text-align: center;
            animation: flashBorder 1s steps(2, start) infinite;
        }

        @keyframes flashBorder {
            to { border-style: dotted; border-color: #ffc30f; }
        }

        .ad-close-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: black;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            line-height: 20px;
            cursor: pointer;
            text-align: center;
        }

        .ad-close-btn:hover {
            background: #ff1100;
        }

        .ad-tag {
            background: #ff1100;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            text-transform: uppercase;
        }

        .ad-text {
            font-size: 0.95rem;
            color: #111;
            font-weight: 700;
            margin: 10px 0;
            line-height: 1.3;
        }

        .ad-link {
            background: #00ffcc;
            color: black;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px;
            border: 1px solid #000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="page-title">THE RISE OF GAMBLING</h1>
        <p id="page-content">Gambling addictions are one of the deadliest addictions in the world and yet gambling and youth gambling is on the rise. Click the SPIN! button to learn why that's a problem.</p>
        <button onclick="goToRandomPage()">SPIN!</button>
    </div>

    <script>
        const pages = [
            {
                title: "GAMBLING HAS NEVER BEEN EASIER",
                content: "With the rise of digital casinos and sports-betting apps, access is available 24/7. Globally, online gambling revenues have surged past $90 billion annually. Friction points like going to a venue or handling physical cash are completely gone—allowing individuals to lose thousands of dollars instantly and silently from their smartphones.",
                bg: "#1a1a2e",
                adType: "apps"
            },
            {
                title: "THE EFFECTS OF GAMBLING",
                content: "The risks of gambling are devastating. Clinicians report that gambling disorder carries one of the highest suicide attempt rates of any addictive disorder. Because there are no visible physical symptoms, it remains a hidden crisis until severe financial ruin, legal trouble, or total psychological collapse occurs.",
                bg: "#e8dbcd",
                adType: "none"
            },
            {
                title: "THE REALITIES OF GAMBLING",
                content: "The house always wins. Casino games are mathematically engineered to ensure the operator retains an edge. Even in sports betting, platforms adjust lines dynamically to guarantee a profit margin. Treating gambling as a consistent revenue stream is a statistical impossibility; it functions exclusively as an entertainment expense.",
                bg: "#e8dbcd",
                adType: "none"
            },
            {
                title: "GAMBLING ADVERTISEMENTS AND NORMALIZATION",
                content: "Regulatory shifts have allowed betting ads to completely saturate mainstream media. Fans and children cannot watch a game without seeing odds crawl across the screen, logos stamped on team jerseys, or celebrity endorsements painting predatory financial mechanics as a casual, glamorous lifestyle hobby.",
                bg: "#0b0c10",
                adType: "ads"
            },
            {
                title: "THE RISE OF YOUTH GAMBLING",
                content: "Underage gambling exposure has skyrocketed due to the gamification of modern video games. Mechanisms like 'loot boxes' mimic slot machine pathways, pushing mystery item rewards for cash. Studies consistently show that adolescent engagement with these monetization systems strongly predicts problem gambling habits in adulthood.",
                bg: "#252839",
                adType: "none"
            },
            {
                title: "THE ADDICTIVENESS OF GAMBLING",
                content: "Gambling hijacks the brain's reward pathway using 'near misses.' Neuroimaging reveals that losing a bet by a hair triggers a massive surge of dopamine almost identical to a win, tricking the brain into feeling that success is imminent. This couples with an 'illusion of control,' where users falsely believe their analytical skill overrides raw probability.",
                bg: "#e4f1fe",
                adType: "none"
            },
            {
                title: "HOW TO HELP",
                content: "Combating problem gambling requires structural friction and support networks. Utilizing self-exclusion registries, installing app-blocking software, and addressing underlying mental health prompts are vital steps. If you or someone you know is struggling, reaching out to local, confidential helplines provides an immediate path forward.",
                bg: "#e4f1fe",
                adType: "none"
            }
        ];

        // Premade arrays of text content for diversity when multiples spawn
        const adPool = [
            { tag: "SPONSOR", text: "🎰 DEPOSIT $5 GET $500 FREE BONUS CASH! 🎰", link: "BET NOW" },
            { tag: "RISK FREE*", text: "⚡ LOCK IN YOUR SPREAD. IN-PLAY ODDS LIVE! ⚡", link: "CLAIM BET" },
            { tag: "PROMO", text: "🔥 CASINO MANIA: UNLIMITED FREE SPINS THIS HOUR! 🔥", link: "PLAY NOW" },
            { tag: "MATCHED", text: "📈 WE MATCH YOUR FIRST DEPOSIT 200% DOWN! 📈", link: "DEPOSIT" },
            { tag: "LIVE ODDS", text: "⚽ OVER/UNDER LIVE ODDS UPDATING BY THE SECOND! ⚽", link: "WAGER" }
        ];

        const appPool = [
            { tag: "INSTALLED", text: "📱 SPIN CASINO APP: Open to instantly place live bets.", link: "OPEN" },
            { tag: "TOP RATED", text: "📱 SPORTSBOOK GO: You left 3 bets pending in your cart!", link: "VIEW" },
            { tag: "ALERT", text: "📱 CHIPS DAILY: Don't miss your hourly streak modifier prize!", link: "CLAIM" },
            { tag: "BET TRACKER", text: "📱 ODDS INSIDER: Premium subscription unlocked for 10m.", link: "ENTER" }
        ];

        let currentPageIndex = -1;

        // Clears any previously spawned ads from the body
        function clearOldAds() {
            const existingAds = document.querySelectorAll('.dynamic-ad');
            existingAds.forEach(ad => ad.remove());
        }

        // Spawns between 1 and 5 ads dynamically across coordinates
        function spawnAds(type) {
            if (type === "none") return;

            const pool = (type === "apps") ? appPool : adPool;
            const numAdsToSpawn = Math.floor(Math.random() * 5) + 1; // 1 to 5 random ads

            for (let i = 0; i < numAdsToSpawn; i++) {
                // Pick a random data template from the pool
                const adData = pool[Math.floor(Math.random() * pool.length)];

                // Create the container element
                const adElement = document.createElement('div');
                adElement.className = 'dynamic-ad';

                // Generate random coordinates (keeping away from edge cutoffs)
                const randomTop = Math.floor(Math.random() * 70) + 5;  // 5% to 75% depth
                const randomLeft = Math.floor(Math.random() * 75) + 5; // 5% to 80% width

                adElement.style.top = `${randomTop}%`;
                adElement.style.left = `${randomLeft}%`;

                // Build internal template including the close functionality
                adElement.innerHTML = `
                    <button class="ad-close-btn" onclick="this.parentElement.remove()">×</button>
                    <span class="ad-tag">${adData.tag}</span>
                    <p class="ad-text">${adData.text}</p>
                    <div class="ad-link">${adData.link}</div>
                `;

                // Inject element directly to body
                document.body.appendChild(adElement);
            }
        }

        function goToRandomPage() {
            let randomIndex;
            
            do {
                randomIndex = Math.floor(Math.random() * pages.length);
            } while (randomIndex === currentPageIndex);

            currentPageIndex = randomIndex;
            const targetPage = pages[randomIndex];

            // Update Main Card Text
            document.getElementById('page-title').innerText = targetPage.title;
            document.getElementById('page-content').innerText = targetPage.content;
            
            // Shift color spectrum background 
            document.body.style.backgroundColor = targetPage.bg;

            // Handle Text Readability contrast
            const textColors = (targetPage.bg === "#1a1a2e" || targetPage.bg === "#0b0c10" || targetPage.bg === "#252839") 
                ? { title: "#ffffff", content: "#cccccc" } 
                : { title: "#333333", content: "#444444" };
                
            document.getElementById('page-title').style.color = textColors.title;
            document.getElementById('page-content').style.color = textColors.content;

            // Clear old random element generations and trigger new instances
            clearOldAds();
            spawnAds(targetPage.adType);
        }
    </script>
</body>
</html>
