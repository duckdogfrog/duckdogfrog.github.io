<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Page Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background 0.5s ease;
        }

        .card {
            background: white;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-top: 0;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        button {
            font-family: 'Oswald', sans-serif;
            background-color: #ffc30f;
            color: black;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #cc9c0c;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="page-title">THE RISE OF GAMBLING</h1>
        <p id="page-content">Gambling addictions are one of the deadliest addictions in the world and yet gambling and youth gambling is on the rise. Click the SPIN! button to learn why that's a problem.</p>
        <button onclick="goToRandomPage()">SPIN!</button>
    </div>

    <script>
        // Define your pool of "random pages" here
        const pages = [
            {
                title: "GAMBLING HAS NEVER BEEN EASIER",
                content: "With the rise of digital casinos and sports-betting apps, why go to a casino when you can just download an app? The ease-of-access has a major impact **STATS ABOUT RISE OF DIGITAL CASINOS**",
                bg: "#1a1a2e" // make background have fake betting apps
            },
            {
                title: "THE EFFECTS OF GAMBLING",
                content: "The risks of gambling are not subtle... STATS ABOUT GAMBLING AND SUICIDE RATES AND FINANCIAL EFFECTS",
                bg: "#e8dbcd"
            },
            {
                title: "THE REALITIES OF GAMBLING",
                content: "How often do people win, anyways? Is it even worth it to gamble as a means to make money?",
                bg: "#e8dbcd" // 
            },
            {
                title: "GAMBLING ADVERTISEMENTS AND NORMALIZATION",
                content: "GAMBLING ADS ARE LEGAL IN MANY PLACES OF THE WORLD NOW (make backgrounds have fake gambling ads",
                bg: "#0b0c10" // make backgrounds have fake gambling ads (for fake betting apps above)
            },
            {
                title: "THE RISE OF YOUTH GAMLBING",
                content: "STATS ABOUT THE RISE OF YOUTHS GAMBLING AND UNDERAGE ACCESS",
                bg: "#252839"
            },
            {
                title: "THE ADDICTIVENESS OF GAMBLING",
                content: "STATS AND WHY GAMBLING IS ADDICTIVE AND THE ILLUSION OF CONTROL AND GAMBLING COMPANY TACTICS",
                bg: "#e4f1fe"
            },
            {
                title: "HOW TO HELP",
                content: "The air is crisp and cold, but the sun is bright. You've finally made it to the top of the world.",
                bg: "#e4f1fe"
            }
        ];

        let currentPageIndex = -1;

        function goToRandomPage() {
            let randomIndex;
            
            // Prevent picking the exact same page twice in a row
            do {
                randomIndex = Math.floor(Math.random() * pages.length);
            } while (randomIndex === currentPageIndex);

            currentPageIndex = randomIndex;
            const targetPage = pages[randomIndex];

            // Update the DOM elements seamlessly
            document.getElementById('page-title').innerText = targetPage.title;
            document.getElementById('page-content').innerText = targetPage.content;
        }
    </script>
</body>
</html>
